  <text x="170" y="63" font-size="16" font-weight="700" fill="#1d2530">BalauDeck</text>
  <text x="270" y="63" font-size="12.5" fill="#9aa4ae">SSH · SFTP · Tunnel · DB</text>

  <!-- Sidebar -->
  <rect x="41" y="85" width="268" height="682" fill="#ffffff"/><line x1="309" y1="85" x2="309" y2="767" stroke="#eceff2"/>
  <text x="64" y="120" font-size="12.5" font-weight="700" fill="#7c8893" letter-spacing="0.4">CONNECTIONS</text>
  <g stroke="#9aa4ae" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 110 a8 8 0 1 1 -2.3 -5.6 M250 105 v4 h-4"/>
    <path d="M268 116 h16 a1.6 1.6 0 0 0 1.6 -1.6 v-7 a1.6 1.6 0 0 0 -1.6 -1.6 h-6.3 l-1.5 -1.7 h-3.2 a1.6 1.6 0 0 0 -1.6 1.6 v9.3 a1.6 1.6 0 0 0 1.6 1.6Z"/>
    <path d="M292 106 h12 M298 100 v12"/>
  </g>
  <rect x="64" y="132" width="222" height="34" rx="9" fill="#f4f6f8" stroke="#e4e9ee"/>
  <circle cx="84" cy="149" r="6" fill="none" stroke="#aab3bc" stroke-width="1.6"/><line x1="88" y1="153" x2="92" y2="157" stroke="#aab3bc" stroke-width="1.6" stroke-linecap="round"/>
  <text x="100" y="153" font-size="12.5" fill="#aab3bc">Search databases &amp; objects</text>

  <g font-size="13.5" fill="#27313c">
    <g transform="translate(70,188)" fill="none" stroke="#1f9e8f" stroke-width="1.5"><ellipse cx="8" cy="3" rx="8" ry="2.6"/><path d="M0 3 v9 c0 1.5 3.6 2.6 8 2.6 s8 -1.1 8 -2.6 v-9"/></g>
    <text x="98" y="200">sample_db</text>
    <g transform="translate(70,224)" fill="none" stroke="#1f9e8f" stroke-width="1.5"><ellipse cx="8" cy="3" rx="8" ry="2.6"/><path d="M0 3 v9 c0 1.5 3.6 2.6 8 2.6 s8 -1.1 8 -2.6 v-9"/></g>
    <text x="98" y="236">sample_db_staging</text>

