    <rect x="536" y="718" width="34" height="24" rx="6" fill="#27313d"/><text x="547" y="734">|</text>
    <rect x="578" y="718" width="34" height="24" rx="6" fill="#27313d"/><text x="588" y="734">~</text>
    <rect x="1150" y="718" width="34" height="24" rx="6" fill="#27313d"/><text x="1160" y="734">↑</text>
    <rect x="1188" y="718" width="34" height="24" rx="6" fill="#27313d"/><text x="1198" y="734">↓</text>
