    <rect x="1108" y="98" width="14" height="14" rx="2.5"/><path d="M1115 98 v14"/>
    <path d="M1138 100 h-3 a2 2 0 0 0 -2 2 v3 M1152 102 v-2 a2 2 0 0 0 -2 -2 h-3 M1133 105 v5 a2 2 0 0 0 2 2 h3 M1147 112 h3 a2 2 0 0 0 2 -2 v-3"/>
    <path d="M1162 99 h6 v6 M1168 99 l-7 7 M1166 104 v4 a1.6 1.6 0 0 1 -1.6 1.6 H1160 a1.6 1.6 0 0 1 -1.6 -1.6 V102 a1.6 1.6 0 0 1 1.6 -1.6 h4"/>
    <path d="M1188 99 l10 10 M1198 99 l-10 10"/>
  </g>

  <!-- Terminal -->
  <rect x="326" y="142" width="898" height="610" rx="12" fill="#11161c"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">
    <text x="350" y="180"><tspan fill="#5fbf57">deploy@sample-server</tspan><tspan fill="#7f8b97">:</tspan><tspan fill="#4ba4e3">~</tspan><tspan fill="#cdd6e0">$ uname -srm</tspan></text>
    <text x="350" y="206" fill="#c3ccd6">Linux 6.1.0-arm64 aarch64</text>
    <text x="350" y="240"><tspan fill="#5fbf57">deploy@sample-server</tspan><tspan fill="#7f8b97">:</tspan><tspan fill="#4ba4e3">~</tspan><tspan fill="#cdd6e0">$ docker ps --format '{{.Names}}'</tspan></text>
    <text x="350" y="266" fill="#c3ccd6">web</text>
    <text x="350" y="290" fill="#c3ccd6">api</text>
    <text x="350" y="314" fill="#c3ccd6">mariadb</text>
    <text x="350" y="348"><tspan fill="#5fbf57">deploy@sample-server</tspan><tspan fill="#7f8b97">:</tspan><tspan fill="#4ba4e3">~</tspan><tspan fill="#cdd6e0">$ df -h / | tail -1</tspan></text>
    <text x="350" y="374" fill="#c3ccd6">/dev/root        58G   21G   35G  38% /</text>
    <text x="350" y="408"><tspan fill="#5fbf57">deploy@sample-server</tspan><tspan fill="#7f8b97">:</tspan><tspan fill="#4ba4e3">~</tspan><tspan fill="#cdd6e0">$ </tspan></text>
    <rect x="445" y="397" width="9" height="16" fill="#5fbf57"/>
  </g>
