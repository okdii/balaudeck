  </defs>
  <rect width="1280" height="800" fill="#e9edf1"/>
  <g filter="url(#shadow)"><rect x="40" y="32" width="1200" height="736" rx="16" fill="#ffffff" stroke="#dfe5ea"/></g>

  <!-- Top bar -->
  <rect x="40" y="32" width="1200" height="52" rx="16" fill="#f7f9fb"/><rect x="40" y="68" width="1200" height="16" fill="#f7f9fb"/>
  <line x1="40" y1="84" x2="1240" y2="84" stroke="#e6ebf0"/>
  <circle cx="64" cy="58" r="6" fill="#ec6a5e"/><circle cx="84" cy="58" r="6" fill="#f3bf4f"/><circle cx="104" cy="58" r="6" fill="#61c655"/>
  <rect x="132" y="44" width="28" height="28" rx="7" fill="url(#logo)"/>
  <path d="M141 51 L150 58 L141 65" fill="none" stroke="#5fbf57" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
