name: Release

# Builds BalauDeck installers for every desktop platform on native runners
# (Tauri bundles can't be cross-compiled — WebView2/MSVC on Windows, .dmg on
# macOS, webkit2gtk on Linux all need their own OS).
#
# - Push a version tag (e.g. `v0.1.0`)  -> builds all platforms and attaches the
#   installers to a DRAFT GitHub Release for you to review and publish.
# - Run manually from the Actions tab    -> builds all platforms and uploads the
#   installers as downloadable artifacts (no release is created).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: native arm64 .dmg. Override the config's signing identity
          # (a personal cert, only on the dev's Mac) to ad-hoc ("-") so codesign
          # works on the CI runner, which has no cert.
          - platform: macos-latest
            args: '--config {"bundle":{"macOS":{"signingIdentity":"-"}}}'
          - platform: ubuntu-22.04 # .deb / .rpm / .AppImage
            args: ""
          - platform: windows-latest # .msi / NSIS .exe
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev \
            build-essential

      - name: Install frontend deps
        run: npm ci

      # Builds the frontend (beforeBuildCommand) + the Rust app and bundles the
      # platform installers. On a tag, also creates/updates a draft release and
      # uploads the bundles to it.
      - name: Build app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "BalauDeck __VERSION__"
          releaseBody: "Download the installer for your platform from the assets below. The installers are not code-signed — on first launch choose Windows SmartScreen → More info → Run anyway, or on macOS right-click → Open."
          # Draft so a tag never auto-publishes — publish deliberately from the
          # Releases page when you actually want to cut a release.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: balaudeck-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/universal-apple-darwin/release/bundle/
          if-no-files-found: ignore
