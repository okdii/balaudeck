name: Release

# Builds BalauDeck installers for every desktop platform on native runners
# (Tauri bundles can't be cross-compiled — WebView2/MSVC on Windows, .dmg on
# macOS, webkit2gtk on Linux all need their own OS).
#
# - Push a version tag (e.g. `v0.1.0`)  -> builds all platforms and attaches the
#   installers to a DRAFT GitHub Release for you to review and publish.
# - Run manually from the Actions tab    -> builds all platforms and uploads the
#   installers as downloadable artifacts (no release is created).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: native arm64 .dmg. Override the config's signing identity
          # (a personal cert, only on the dev's Mac) to ad-hoc ("-") so codesign
          # works on the CI runner, which has no cert.
          - platform: macos-latest
            args: '--config {"bundle":{"macOS":{"signingIdentity":"-"}}}'
          - platform: ubuntu-22.04 # .deb / .rpm / .AppImage
            args: ""
          - platform: windows-latest # .msi / NSIS .exe
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev \
            build-essential

      - name: Install frontend deps
        run: npm ci

      # Builds the frontend (beforeBuildCommand) + the Rust app and bundles the
      # platform installers. On a tag, also creates/updates a draft release and
      # uploads the bundles to it.
      # Signs the desktop self-updater artifacts and emits `latest.json`. Needs
      # two repo secrets (Settings -> Secrets and variables -> Actions):
      #   TAURI_SIGNING_PRIVATE_KEY           -> contents of ~/keystores/balaudeck-updater.key
      #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  -> its password ("" if none)
      # The updater endpoint (tauri.conf.json) reads latest.json from the LATEST
      # published release, so a draft never pushes an update until you publish it.
      - name: Build app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Bake the desktop Google Drive OAuth client into the installer so it
          # works out-of-box (no per-machine gdrive_client.json). Optional: unset
          # secrets just mean Drive shows "not configured" until a file is added.
          BALAUDECK_GOOGLE_CLIENT_ID: ${{ secrets.BALAUDECK_GOOGLE_CLIENT_ID }}
          BALAUDECK_GOOGLE_CLIENT_SECRET: ${{ secrets.BALAUDECK_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "BalauDeck __VERSION__"
          releaseBody: "Download the installer for your platform from the assets below. The installers are not code-signed — on first launch choose Windows SmartScreen → More info → Run anyway, or on macOS right-click → Open."
          # Draft so a tag never auto-publishes — publish deliberately from the
          # Releases page when you actually want to cut a release.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: balaudeck-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/universal-apple-darwin/release/bundle/
          if-no-files-found: ignore

  # Android: signed universal .apk for direct download / sideloading. Needs four
  # repo secrets (Settings -> Secrets and variables -> Actions):
  #   ANDROID_KEYSTORE_BASE64  -> `base64 -i ~/keystores/balaudeck-upload.jks`
  #   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
  # NOTE: this APK is signed with the UPLOAD key; the Play Store copy is re-signed
  # by Play App Signing, so the two can't update over each other — sideload only.
  android-apk:
    name: Android APK
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK r27
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install frontend deps
        run: npm ci

      - name: Restore signing keystore
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::Missing ANDROID_KEYSTORE_BASE64 secret — see this job's comment."
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/upload.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          npm run tauri -- android build --apk
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk BalauDeck.apk

      - name: Attach APK to the draft release (tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: BalauDeck.apk

      - name: Upload APK artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: balaudeck-android-apk
          path: BalauDeck.apk
